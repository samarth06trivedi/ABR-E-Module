<!doctype html>
<html>
  <head>
    <title>ABR Quiz</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6fb;
      }

      /* MAIN LAYOUT */
      .quiz-wrapper {
        display: flex;
        height: 100vh;
      }

      /* LEFT SIDE */
      .quiz-main {
        width: 75%;
        padding: 30px;
        background: white;
      }

      .quiz-side {
        width: 25%;
        background: #eef2ff;
        padding: 20px;
        border-left: 1px solid #ccc;
      }

      .question-number {
        display: inline-block;
        width: 40px;
        height: 40px;
        line-height: 40px;
        text-align: center;
        margin: 5px;
        border-radius: 6px;
        background: #ddd;
        cursor: pointer;
        font-weight: bold;
      }

      .question-number.attempted {
        background: #28a745;
        color: white;
      }

      .question-number.review {
        background: #ffc107;
      }

      .option {
        margin: 10px 0;
      }

      .controls {
        margin-top: 20px;
      }

      button {
        padding: 8px 15px;
        margin-right: 10px;
        border: none;
        background: #4e73df;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #2e59d9;
      }

      #timer {
        font-weight: bold;
        color: red;
        margin-bottom: 15px;
      }

      .review-answer {
        margin-top: 10px;
        padding: 10px;
        border-radius: 5px;
      }
      .correct {
        background: #d4edda;
      }
      .wrong {
        background: #f8d7da;
      }
    </style>
  </head>

  <body>
    <div class="quiz-wrapper">
      <div class="quiz-main">
        <div id="timer"></div>
        <h2 id="question"></h2>
        <div id="options"></div>

        <div class="controls">
          <button id="prevBtn" onclick="prevQuestion()">Prev</button>
          <button onclick="markForReview()">Mark for Review</button>
          <button id="nextBtn" onclick="nextQuestion()">Next</button>
          <button onclick="submitQuiz()">Submit</button>
        </div>
      </div>

      <div class="quiz-side">
        <h3>Questions</h3>
        <div id="questionList"></div>
      </div>
    </div>

    <script>
      const quiz = [
        {
          question:
            "1. ABR primarily evaluates the integrity of which pathway?",
          options: [
            "A. Cochlea to auditory cortex",
            "B. Tympanic membrane to cochlea",
            "C. Cochlea to brainstem",
            "D. Outer ear to middle ear",
          ],
          answer: 2,
        },
        {
          question:
            "2. Which ABR waves are considered most clinically reliable?",
          options: [
            "A. Waves II, IV, VI",
            "B. Waves I, II, III",
            "C. Waves I, III, and V",
            "D. Waves IV, V, VII",
          ],
          answer: 2,
        },
        {
          question:
            "3. The most robust wave used for threshold estimation in ABR is:",
          options: ["A. Wave I", "B. Wave III", "C. Wave IV", "D. Wave V"],
          answer: 3,
        },
        {
          question:
            "4. For infants undergoing ABR testing, the ideal test condition is:",
          options: [
            "A. Awake and alert",
            "B. Under anesthesia always",
            "C. Light sedation",
            "D. Natural sleep",
          ],
          answer: 3,
        },
        {
          question:
            "5. According to standard electrode montage described by Linda J. Hood, the non-inverting electrode is typically placed at:",
          options: [
            "A. Mastoid (M1/M2)",
            "B. Earlobe",
            "C. High forehead (Fz) or vertex (Cz)",
            "D. Contralateral mastoid",
          ],
          answer: 2,
        },
        {
          question:
            "6. Acceptable electrode impedance for ABR recording should be:",
          options: [
            "A. Below 10 kΩ",
            "B. Below 20 kΩ",
            "C. Below 5 kΩ",
            "D. Below 15 kΩ",
          ],
          answer: 2,
        },
        {
          question:
            "7. Which stimulus is primarily used for neural integrity testing?",
          options: [
            "A. Tone burst",
            "B. Chirp stimulus",
            "C. Narrow band noise",
            "D. Click stimulus",
          ],
          answer: 3,
        },
        {
          question: "8. Typical filter settings used during ABR recording are:",
          options: [
            "A. 10–100 Hz",
            "B. 50–500 Hz",
            "C. 100–3000 Hz",
            "D. 300–6000 Hz",
          ],
          answer: 2,
        },
        {
          question:
            "9. During threshold-seeking ABR, intensity is reduced in steps of:",
          options: [
            "A. 20 dB",
            "B. 10 dB steps, then 5 dB near threshold",
            "C. 15 dB steps",
            "D. 5 dB steps",
          ],
          answer: 0,
        },
        {
          question:
            "10. In neurodiagnostic ABR, a significant interaural Wave V delay may indicate:",
          options: [
            "A. Middle ear pathology",
            "B. Conductive hearing loss",
            "C. Retrocochlear pathology",
            "D. Cochlear microphonics",
          ],
          answer: 2,
        },
      ];

      let currentQuestion = 0;
      let userAnswers = new Array(quiz.length).fill(null);
      let reviewMarked = new Array(quiz.length).fill(false);
      let timeLeft = 600; // 10 minutes
      let timer;

      /* TIMER */
      function startTimer() {
        timer = setInterval(() => {
          let minutes = Math.floor(timeLeft / 60);
          let seconds = timeLeft % 60;
          document.getElementById("timer").innerText =
            "Time Left: " + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

          timeLeft--;

          if (timeLeft < 0) {
            clearInterval(timer);
            submitQuiz(true); // auto submit
          }
        }, 1000);
      }

      /* LOAD QUESTION */
      function loadQuestion(index) {
        currentQuestion = index;

        document.getElementById("question").innerText = quiz[index].question;

        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";

        quiz[index].options.forEach((option, i) => {
          optionsDiv.innerHTML += `
      <div class="option">
        <input type="radio" name="option" value="${i}"
        ${userAnswers[index] === i ? "checked" : ""}>
        ${option}
      </div>
    `;
        });

        // ✅ Hide / Show Prev & Next Buttons
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        if (currentQuestion === 0) {
          prevBtn.style.display = "none";
        } else {
          prevBtn.style.display = "inline-block";
        }

        if (currentQuestion === quiz.length - 1) {
          nextBtn.style.display = "none";
        } else {
          nextBtn.style.display = "inline-block";
        }

        updateQuestionStatus();
      }

      /* SAVE ANSWER */
      function saveAnswer() {
        const selected = document.querySelector('input[name="option"]:checked');
        if (selected) {
          userAnswers[currentQuestion] = parseInt(selected.value);
        }
      }

      /* NAVIGATION */
      function nextQuestion() {
        saveAnswer();
        if (currentQuestion < quiz.length - 1)
          loadQuestion(currentQuestion + 1);
      }

      function prevQuestion() {
        saveAnswer();
        if (currentQuestion > 0) loadQuestion(currentQuestion - 1);
      }

      function markForReview() {
        reviewMarked[currentQuestion] = true;
        updateQuestionStatus();
      }

      /* QUESTION PANEL */
      function createQuestionPanel() {
        const panel = document.getElementById("questionList");
        panel.innerHTML = "";

        for (let i = 0; i < quiz.length; i++) {
          panel.innerHTML += `
      <div class="question-number" onclick="jumpTo(${i})" id="q${i}">
        ${i + 1}
      </div>
    `;
        }
      }

      function jumpTo(index) {
        saveAnswer();
        loadQuestion(index);
      }

      function updateQuestionStatus() {
        for (let i = 0; i < quiz.length; i++) {
          let btn = document.getElementById("q" + i);
          btn.classList.remove("attempted", "review");

          if (userAnswers[i] !== null) {
            btn.classList.add("attempted");
          }

          if (reviewMarked[i]) {
            btn.classList.remove("attempted");
            btn.classList.add("review");
          }
        }
      }

      /* SUBMIT */
      function submitQuiz(auto = false) {
        saveAnswer();

        // ✅ Show warning only if manually submitting and time remains
        if (!auto && timeLeft > 0) {
          const confirmSubmit = confirm(
            "Time is still remaining. Do you want to submit the quiz?",
          );
          if (!confirmSubmit) return;
        }

        clearInterval(timer);

        let score = 0;
        let resultHTML = "<h2>Quiz Completed</h2>";

        for (let i = 0; i < quiz.length; i++) {
          let correctAnswer = quiz[i].answer;
          let userAnswer = userAnswers[i];

          if (userAnswer === correctAnswer) score++;

          resultHTML += `
      <div class="review-answer ${
        userAnswer === correctAnswer ? "correct" : "wrong"
      }">
        <strong>Q${i + 1}:</strong> ${quiz[i].question}<br>
        <strong>Your Answer:</strong> ${
          userAnswer !== null ? quiz[i].options[userAnswer] : "Not Attempted"
        }<br>
        <strong>Correct Answer:</strong> ${quiz[i].options[correctAnswer]}
      </div>
      <hr>
    `;
        }

        resultHTML =
          `<h2>Your Score: ${score} / ${quiz.length}</h2>` +
          resultHTML +
          `
    <br>
    <button onclick="goHome()" style="
        padding:10px 20px;
        background:#4e73df;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;">
        Go Back to Home
    </button>
  `;

        document.body.innerHTML = resultHTML;
      }

      function goHome() {
        window.location.href = "index.html"; // change if your home file name is different
      }

      /* INIT */
      createQuestionPanel();
      loadQuestion(0);
      startTimer();
    </script>
  </body>
</html>
