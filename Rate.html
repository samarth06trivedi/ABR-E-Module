<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABR Stimulus Rate Effect</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f4f6fb;
}
canvas{
background:white;
border:1px solid #ccc;
margin-top:20px;
}
.slider{
width:400px;
}
</style>
</head>
<body>

<h2>Effect of Stimulus Rate on ABR</h2>
<p>Stimulus Rate: <span id="rateVal">11</span> clicks/sec</p>
<input type="range" min="11" max="90" value="11" class="slider" id="rateSlider">

<br>
<canvas id="abrCanvas" width="900" height="400"></canvas>

<script>

const canvas = document.getElementById("abrCanvas");
const ctx = canvas.getContext("2d");

const slider = document.getElementById("rateSlider");
const rateVal = document.getElementById("rateVal");

slider.oninput = function(){
rateVal.innerText = this.value;
drawABR(this.value);
}

function drawAxes(){
ctx.strokeStyle="black";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(60,350);
ctx.lineTo(850,350);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(60,350);
ctx.lineTo(60,40);
ctx.stroke();

ctx.fillText("Latency (ms)",430,390);

ctx.save();
ctx.rotate(-Math.PI/2);
ctx.fillText("Amplitude (µV)",-240,20);
ctx.restore();

for(let i=0;i<=10;i++){
let x = 60 + i*70;
ctx.fillText(i,x,365);
}
}

function gaussian(x,mu,amp,width){
return amp*Math.exp(-(Math.pow((x-mu),2))/(2*width*width));
}

function drawABR(rate){

ctx.clearRect(0,0,canvas.width,canvas.height);
drawAxes();

// Rate effects
let latencyShift = (rate-11)/50;      // latency increases with rate
let ampScale = 1 - (rate-11)/100;     // amplitude decreases
let widthBroadening = (rate-11)/200;  // morphology poorer (broader peaks)

ctx.beginPath();
ctx.strokeStyle="blue";
ctx.lineWidth=2;

for(let x=0;x<800;x++){

let t = x/80;

let y =
gaussian(t,1.6+latencyShift,0.6*ampScale,0.12+widthBroadening)+
gaussian(t,2.7+latencyShift,0.7*ampScale,0.14+widthBroadening)+
gaussian(t,3.7+latencyShift,0.9*ampScale,0.15+widthBroadening)+
gaussian(t,4.8+latencyShift,0.8*ampScale,0.17+widthBroadening)+
gaussian(t,5.8+latencyShift,1.1*ampScale,0.2+widthBroadening);

let plotX = 60 + x;
let plotY = 350 - y*200;

if(x===0) ctx.moveTo(plotX,plotY);
else ctx.lineTo(plotX,plotY);
}

ctx.stroke();

// Mark Peaks
markPeak(1.6+latencyShift,"I",0.6*ampScale);
markPeak(2.7+latencyShift,"II",0.7*ampScale);
markPeak(3.7+latencyShift,"III",0.9*ampScale);
markPeak(4.8+latencyShift,"IV",0.8*ampScale);
markPeak(5.8+latencyShift,"V",1.1*ampScale);

}

function markPeak(lat,label,amp){

let x = 60 + lat*80;
let y = 350 - amp*200;

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(x,y,4,0,Math.PI*2);
ctx.fill();

ctx.fillText(label,x-3,y-10);
}

// Initial draw
drawABR(11);

</script>

</body>
</html>
